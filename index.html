<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Portfolio — resume and GitHub projects."
    />
    <title>Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Oswald:wght@500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="noir-vignette" aria-hidden="true"></div>
    <div class="noir-grain" aria-hidden="true"></div>
    <header class="site-header">
      <a class="logo" href="#">portfolio</a>
      <nav class="nav">
        <a href="#resume">Resume</a>
        <a href="#projects">Projects</a>
      </nav>
    </header>

    <main>
      <section class="hero" id="top">
        <p class="hero-kicker">Hello —</p>
        <h1 class="hero-name" id="hero-name">Your Name</h1>
        <p class="hero-title" id="hero-title">Software Developer</p>
        <p class="hero-tagline" id="hero-tagline"></p>
        <div class="hero-actions" id="hero-social"></div>
      </section>

      <section class="section" id="resume">
        <div class="section-head">
          <h2>Resume</h2>
        </div>
        <div class="resume-toolbar">
          <a class="btn btn-primary" id="resume-download" href="resume.pdf" download>
            Download PDF
          </a>
          <span class="resume-status" id="resume-status"></span>
        </div>
        <div class="resume-frame-wrap">
          <iframe
            id="resume-frame"
            class="resume-frame"
            title="Resume PDF"
            src="about:blank"
          ></iframe>
        </div>
      </section>

      <section class="section" id="projects">
        <div class="section-head">
          <h2>Projects</h2>
        </div>
        <p class="projects-error" id="projects-error" hidden></p>
        <div class="projects-grid" id="projects-grid" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <span id="footer-built"></span>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
